            <p style="font-size: 1.1rem; line-height: 1.6; color: #ccc;">
                <?= htmlspecialchars($game->getDescription()); ?>

            <div style="margin: 30px 0; padding: 20px; background: #2c2c2c; border-left: 4px solid #bb86fc;">

            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #444; padding-top: 20px;">

                        <button id="buy-button" onclick="buyGame('<?= $game->getId() ?>')">Add to Library</button>

                <span id="response-message" style="margin-left: 15px; font-weight: bold;"></span>
            </div>

    <script>
        function buyGame(gameId) {
            const button = document.getElementById('buy-button');
            const messageSpan = document.getElementById('response-message');
            
            // Lock the button to prevent double-clicking
            button.disabled = true;
            button.innerText = "Processing...";

            // We send an asynchronous POST request to the address /buy
            fetch('/buy', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ gameId: gameId })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // We change the interface after success (green message)
                    button.style.backgroundColor = "#333";
                    button.style.color = "#888";
                    button.innerText = "In Library";
                    messageSpan.style.color = "#03dac6";
                    messageSpan.innerText = "Added successfully!";
                } else {
                    // Handling errors from the server
                    button.disabled = false;
                    button.innerText = "Add to Library";
                    messageSpan.style.color = "red";
                    messageSpan.innerText = data.error || "An error occurred";
                }
            })
            .catch(error => {
                console.error("Error:", error);
                button.disabled = false;
                button.innerText = "Add to Library";
                messageSpan.style.color = "red";
                messageSpan.innerText = "Connection error";
            });
        }
    </script>
  </body>
</html>
