<!doctype html>
<html lang="en">
  <head>
    <?php include __DIR__ . '/partials/head.html'; ?>
    <title><?= $title; ?></title>
  </head>
  <body>
    <?php include __DIR__ . '/partials/nav.html'; ?>

    <main class="store-layout">
        <?php if(isset($_GET['search']) && !empty($_GET['search'])): ?>
            <div class="section-header">
                <h2>Results: "<?= htmlspecialchars($_GET['search']) ?>"</h2>
            </div>
            
            <?php if(empty($games)): ?>
                <div class="empty-state">
                    <i class="fa-solid fa-ghost"></i>
                    <h3>No games found</h3>
                    <p>Try a different title or clear your search.</p>
                    <a href="/" class="btn-outline">Clear Search</a>
                </div>
            <?php endif; ?>
            
        <?php else: ?>
            <div class="section-header">
                <h2>Browse All Games</h2>
            </div>
        <?php endif; ?>

        <?php if(!empty($games)): ?>
            <div class="game-grid" id="store-grid">
                <?php foreach($games as $index => $game): ?>
                    <a href="/game/<?= $game->getId() ?>" class="game-card <?= ($index >= 4 && empty($_GET['search'])) ? 'hidden-game' : '' ?>">
                        <div class="game-card-image-wrapper">
                            <img src="/public/resources/covers/<?= htmlspecialchars($game->getGraphics() ?: 'default.jpg'); ?>" alt="<?= htmlspecialchars($game->getTitle()); ?>">
                        </div>
                        <div class="game-card-content">
                            <div class="game-card-meta">
                                <span class="game-card-category"><?= htmlspecialchars($game->getCategory()); ?></span>
                                <span class="game-card-rating"><i class="fa-solid fa-star"></i> <?= number_format($game->getAverageRating(), 1); ?></span>
                            </div>
                            <h3 class="game-card-title"><?= htmlspecialchars($game->getTitle()); ?></h3>
                            <p class="game-card-price"><?= $game->getFormattedPrice(); ?></p>
                        </div>
                    </a>
                <?php endforeach; ?>
            </div>

            <?php if(count($games) > 4 && empty($_GET['search'])): ?>
                <div class="load-more-wrapper">
                    <button id="load-more-btn" class="btn-load-more">Load More Games <i class="fa-solid fa-chevron-down"></i></button>
                </div>
            <?php endif; ?>
        <?php endif; ?>
    </main>

    <footer class="main-footer">
        &copy; 2026 GameNest &mdash; Built for players, not publishers.
    </footer>
  </body>
</html>
